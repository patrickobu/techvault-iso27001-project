<svg width="100%" viewBox="0 0 680 500" xmlns="http://www.w3.org/2000/svg">
<title>TechVault ISO 27001 risk heat map showing 25 risks by likelihood and impact</title>
<desc>Risk heat map grid showing likelihood on vertical axis and impact on horizontal axis with risk counts in each cell colour coded from green low to red critical</desc>

<text x="340" y="26" text-anchor="middle" font-family="Arial,sans-serif" font-size="15" font-weight="bold" fill="#3C3489">TechVault Ltd — ISO 27001:2022 Risk Heat Map</text>
<text x="340" y="44" text-anchor="middle" font-family="Arial,sans-serif" font-size="11" fill="#555">25 identified risks plotted by likelihood and impact</text>

<!-- Axis labels -->
<text x="340" y="470" text-anchor="middle" font-family="Arial,sans-serif" font-size="12" font-weight="bold" fill="#333">Impact →</text>
<text x="28" y="280" text-anchor="middle" font-family="Arial,sans-serif" font-size="12" font-weight="bold" fill="#333" transform="rotate(-90,28,280)">Likelihood →</text>

<!-- Impact labels -->
<text x="162" y="78" text-anchor="middle" font-family="Arial,sans-serif" font-size="11" fill="#333">Negligible</text>
<text x="272" y="78" text-anchor="middle" font-family="Arial,sans-serif" font-size="11" fill="#333">Minor</text>
<text x="382" y="78" text-anchor="middle" font-family="Arial,sans-serif" font-size="11" fill="#333">Moderate</text>
<text x="492" y="78" text-anchor="middle" font-family="Arial,sans-serif" font-size="11" fill="#333">Major</text>
<text x="602" y="78" text-anchor="middle" font-family="Arial,sans-serif" font-size="11" fill="#333">Catastrophic</text>

<!-- Likelihood labels -->
<text x="105" y="122" text-anchor="end" font-family="Arial,sans-serif" font-size="11" fill="#333">Almost Certain</text>
<text x="105" y="202" text-anchor="end" font-family="Arial,sans-serif" font-size="11" fill="#333">Likely</text>
<text x="105" y="282" text-anchor="end" font-family="Arial,sans-serif" font-size="11" fill="#333">Possible</text>
<text x="105" y="362" text-anchor="end" font-family="Arial,sans-serif" font-size="11" fill="#333">Unlikely</text>
<text x="105" y="432" text-anchor="end" font-family="Arial,sans-serif" font-size="11" fill="#333">Rare</text>

<!-- Grid cells - row 1 (Almost Certain) -->
<rect x="110" y="88" width="100" height="60" rx="3" fill="#FFF8E1" stroke="#ccc" stroke-width="0.5"/>
<rect x="215" y="88" width="100" height="60" rx="3" fill="#FFE0B2" stroke="#ccc" stroke-width="0.5"/>
